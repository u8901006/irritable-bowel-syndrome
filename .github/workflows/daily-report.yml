name: IBS Daily Report

on:
  schedule:
    - cron: "25 12 * * *" # UTC 12:25 = GMT+8 20:25
  workflow_dispatch:
    inputs:
      date:
        description: "Target date (YYYY-MM-DD), leave empty for today"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "24"

      - name: Determine date
        id: date
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            echo "target=${{ github.event.inputs.date }}" >> "$GITHUB_OUTPUT"
          else
            TARGET=$(TZ=Asia/Taipei date +%Y-%m-%d)
            echo "target=$TARGET" >> "$GITHUB_OUTPUT"
          fi
          echo "Date: $(grep target "$GITHUB_OUTPUT" | cut -d= -f2)"

      - name: Restore summarized history
        run: |
          if [ -f summarized_history.json ]; then
            echo "Found summarized history"
            cp summarized_history.json papers_summarized.json
          else
            echo '{"initialized": true}' > papers_summarized.json
          fi

      - name: Fetch papers from PubMed
        run: |
          node scripts/fetch_papers.js \
            --days 7 \
            --max-papers 40 \
            --summarized papers_summarized.json \
            --output papers.json
        continue-on-error: true
        timeout-minutes: 10

      - name: Check papers data
        id: papers
        run: |
          if [ -f papers.json ] && grep -q '"count"' papers.json; then
            COUNT=$(node -e "const d=require('./papers.json'); console.log(d.count || 0)")
            echo "count=$COUNT" >> "$GITHUB_OUTPUT"
            echo "Papers found: $COUNT"
          else
            echo "count=0" >> "$GITHUB_OUTPUT"
            echo '{"date":"${{ steps.date.outputs.target }}","count":0,"papers":[]}' > papers.json
            echo "No papers found, will generate empty report"
          fi

      - name: Generate report with Zhipu AI
        env:
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
        run: |
          node scripts/generate_report.js \
            --input papers.json \
            --output docs/ibs-${{ steps.date.outputs.target }}.html
        timeout-minutes: 15

      - name: Generate index page
        run: node scripts/generate_index.js

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/ summarized_history.json
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "📄 IBS daily report: ${{ steps.date.outputs.target }}"
          git pull --rebase origin main
          git push

      - name: Summary
        run: |
          echo "### 📄 IBS Daily Report" >> "$GITHUB_STEP_SUMMARY"
          echo "**Date:** ${{ steps.date.outputs.target }}" >> "$GITHUB_STEP_SUMMARY"
          echo "**Papers analyzed:** ${{ steps.papers.outputs.count }}" >> "$GITHUB_STEP_SUMMARY"
          echo "**Report:** [ibs-${{ steps.date.outputs.target }}.html](https://u8901006.github.io/irritable-bowel-syndrome/ibs-${{ steps.date.outputs.target }}.html)" >> "$GITHUB_STEP_SUMMARY"
